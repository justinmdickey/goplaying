version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: darwin
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    binary: goplaying
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: linux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    binary: goplaying
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: darwin-targz
    builds:
      - darwin
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format: tar.gz
    files:
      - README.md
      - LICENSE
      - src: dist/nowplaying-darwin-{{ if eq .Arch "amd64" }}x86_64{{ else }}arm64{{ end }}/nowplaying
        dst: .
        strip_parent: true

  - id: linux-targz
    builds:
      - linux
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format: tar.gz
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

brews:
  - name: goplaying
    ids:
      - darwin-targz
    repository:
      owner: justinmdickey
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/justinmdickey/goplaying"
    description: "Cross-platform Now Playing TUI for Spotify, Apple Music, and more"
    license: "MIT"
    directory: Formula
    install: |
      bin.install "goplaying"
      bin.install "nowplaying"
    test: |
      system "#{bin}/goplaying", "--version"
    caveats: |
      macOS:
        - The nowplaying helper is included for broad Now Playing support
          (Safari, Chrome, and any app that reports to macOS Media Center)
        - Album artwork works with Spotify, Apple Music, and more
      Linux:
        - Install via GitHub releases (Homebrew formula is macOS-only)
        - Requires playerctl to be installed separately

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: justinmdickey
    name: goplaying
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## GoPlaying {{.Version}}

    Cross-platform Now Playing TUI for Spotify, Apple Music, and more on Linux and macOS.
  footer: |
    ## Installation

    Download the appropriate archive for your platform, extract it, and move the binary to your PATH.

    ### Quick Install (Linux/macOS)
    ```bash
    # Extract and install
    tar -xzf goplaying_*_Linux_x86_64.tar.gz
    sudo mv goplaying /usr/local/bin/
    ```

    **Full installation instructions:** [README.md](https://github.com/justinmdickey/goplaying#installation)
